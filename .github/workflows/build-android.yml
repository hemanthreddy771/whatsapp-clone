name: Build Android APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch: # Allows you to manually trigger the build from the Actions tab

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install dependencies
        run: npm install

      - name: Create Native Android Project (Prebuild)
        run: npx expo prebuild --platform android --clean

      - name: Build Android APK
        run: |
          cd android
          echo "reactNativeArchitectures=armeabi-v7a,arm64-v8a" >> gradle.properties
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: WhatsApp-Clone-APK
          path: android/app/build/outputs/apk/release/app-release.apk
